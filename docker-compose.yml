services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: hedge_fund
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hedge_fund"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/hedge_fund}
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "main.py", "bias"]

volumes:
  postgres_data:
